{% extends "admin_base.html" %}

{% block title %}

Admin Login

{% endblock %}

{% block content %}

<div class="admin-container">

    <div class="admin-card">

        <h2>College Admin Login</h2>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">

                Login

            </button>

        </form>

    </div>

</div>

{% endblock %}
